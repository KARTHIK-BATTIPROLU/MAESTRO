version: "3.9"

# ─── MAESTRO — Local Development Stack ────────────────────────────────────────
# Usage:
#   1. Copy agent-service/.env.example → agent-service/.env  (add GEMINI_API_KEY)
#   2. Copy backend/.env.example       → backend/.env        (add MONGODB_URI)
#   3. Copy frontend/.env.example      → frontend/.env       (optional, defaults work)
#   4. docker compose up --build
#
# Services:
#   Frontend  → http://localhost:5173
#   Backend   → http://localhost:5000
#   Agent     → http://localhost:8000

services:
  # ─── Agent Service (Python / FastAPI) ────────────────────────────────────────
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./agent-service/.env
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DEBUG=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=development
      - AGENT_SERVICE_URL=http://agent-service:8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    depends_on:
      agent-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─── Frontend (React / Vite dev server) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
