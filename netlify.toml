[build]
  base      = "frontend"
  command   = "npm install && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — send all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Optional: Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
