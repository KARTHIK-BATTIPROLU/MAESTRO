services:
  # ─── Agent Service (Python / FastAPI) ────────────────────────────────────────
  - type: web
    name: maestro-agent-service
    runtime: python
    region: oregon
    plan: free
    buildCommand: cd agent-service && pip install -r requirements.txt
    startCommand: cd agent-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-1.5-flash
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PYTHON_VERSION
        value: 3.11.4

  # ─── Backend (Node.js / Express) ─────────────────────────────────────────────
  - type: web
    name: maestro-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install --production
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: AGENT_SERVICE_URL
        fromService:
          type: web
          name: maestro-agent-service
          property: host
      # Set this to your Netlify URL after first deploy, e.g. https://maestro-app.netlify.app
      - key: CORS_ORIGINS
        sync: false
